<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oceňování dřevin — kalkulačka AOPK ČR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f1efe9; font-family: 'Inter', system-ui, sans-serif; }

</style>

<body>
<div id="root"></div>

<!--
  Načítání závislostí v tomto pořadí:
  1. React + ReactDOM + Babel (CDN, pinned + integrity)
  2. data.js, calc.js — mock data + lokální výpočet (fallback)
  3. api-client.js — wrapper kolem fetch('/api/...')
  4. tree-viz.jsx, waterfall.jsx, app.jsx — UI komponenty

  Konfigurace backendu: pokud běží jinde než na stejném originu, nastav:
    <script>window.OCENOVANI_API = 'https://api.example.cz';</script>
  PŘED načtením api-client.js.
-->

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script src="static/data.js"></script>
<script src="static/calc.js"></script>
<script src="static/api-client.js"></script>

<script type="text/babel" src="static/tree-viz.jsx"></script>
<script type="text/babel" src="static/waterfall.jsx"></script>
<script type="text/babel" src="static/app.jsx"></script>

</body>
</html>
